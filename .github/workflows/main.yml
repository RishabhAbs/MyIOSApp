name: Build iOS App

on:
  push:
    branches:
      - master

jobs:
  build-ios:
    runs-on: macos-13
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build with Expo
        run: npx eas-cli@latest build --platform ios --non-interactive

      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: ios-build
          path: '*.ipa'
